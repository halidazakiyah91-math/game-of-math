<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Diagram Pencar - Statistika Kelas XI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; }
        .canvas-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        canvas { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; height: auto; touch-action: none; }
        .btn-choice { transition: all 0.2s; }
        .btn-choice:active { transform: scale(0.95); }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Kontrol Musik Mengambang */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
        }
        .music-btn {
            background: white;
            padding: 12px;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }
        .music-btn:hover {
            transform: scale(1.1);
            background: #f8fafc;
        }
        .music-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Elemen Audio -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://github.com/halidazakiyah91-math/music-game/raw/refs/heads/main/Sunday_Morning_Quest.mp3" type="audio/mpeg">
        Browser Anda tidak mendukung elemen audio.
    </audio>

    <!-- Tombol Kontrol Musik -->
    <div class="music-control">
        <button id="toggleMusic" class="music-btn" title="Nyalakan/Matikan Musik">
            <span id="musicIcon" style="font-size: 24px;">🔇</span>
        </button>
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-indigo-700">Master Diagram Pencar</h1>
            <p class="text-gray-600">Statistika Kelas XI - Analisis Korelasi Bivariat</p>
        </div>

        <!-- Skor & Progress -->
        <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-xl shadow-sm">
            <div class="text-lg">Skor: <span id="score" class="font-bold text-indigo-600">0</span></div>
            <div class="text-lg">Level: <span id="level" class="font-bold text-orange-500">1</span>/10</div>
        </div>

        <!-- Area Game -->
        <div class="bg-white p-6 rounded-2xl shadow-xl mb-6">
            <div id="question-text" class="text-center text-lg font-semibold mb-4 text-gray-800">
                Identifikasi jenis korelasi pada diagram di bawah ini:
            </div>
            
            <div class="canvas-container">
                <canvas id="plotCanvas" width="400" height="400"></canvas>
            </div>

            <!-- AI Tools -->
            <div class="flex flex-wrap gap-2 justify-center mt-4">
                <button id="ai-explain-btn" class="bg-purple-100 text-purple-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-purple-200 transition flex items-center gap-2">
                    ✨ Tanya AI Tutor
                </button>
                <button id="ai-scenario-btn" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-emerald-200 transition flex items-center gap-2">
                    ✨ Buat Skenario Data
                </button>
            </div>

            <!-- AI Response Area -->
            <div id="ai-response-container" class="hidden mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100 text-sm text-gray-700 italic relative">
                <div id="ai-loader" class="hidden absolute inset-0 bg-white bg-opacity-70 flex items-center justify-center rounded-xl">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>
                </div>
                <div id="ai-text"></div>
            </div>

            <!-- Pilihan Jawaban -->
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-6">
                <!-- Tombol akan dihasilkan oleh JavaScript -->
            </div>
        </div>

        <!-- Pesan Umpan Balik -->
        <div id="feedback" class="hidden text-center p-4 rounded-lg font-bold mb-4"></div>

        <!-- Kontrol Navigasi -->
        <div class="flex justify-center">
            <button id="next-btn" class="hidden bg-indigo-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-indigo-700 transition shadow-lg">
                Soal Berikutnya
            </button>
        </div>
    </div>

    <!-- Modal Hasil Akhir -->
    <div id="result-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold mb-2">Permainan Selesai!</h2>
            <p id="final-stats" class="text-gray-600 mb-6">Skor akhir kamu: 0</p>
            <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Ulangi Belajar</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // Disediakan oleh lingkungan runtime
        const canvas = document.getElementById('plotCanvas');
        const ctx = canvas.getContext('2d');
        const optionsContainer = document.getElementById('options-container');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const aiResponseContainer = document.getElementById('ai-response-container');
        const aiText = document.getElementById('ai-text');
        const aiLoader = document.getElementById('ai-loader');

        // Elemen Audio
        const bgMusic = document.getElementById('bgMusic');
        const toggleMusicBtn = document.getElementById('toggleMusic');
        const musicIcon = document.getElementById('musicIcon');

        let currentLevel = 1;
        let score = 0;
        let currentAnswer = "";
        let isMusicPlaying = false;

        const types = [
            { id: 'pos_strong', label: 'Korelasi Positif Kuat' },
            { id: 'pos_weak', label: 'Korelasi Positif Lemah' },
            { id: 'neg_strong', label: 'Korelasi Negatif Kuat' },
            { id: 'neg_weak', label: 'Korelasi Negatif Lemah' },
            { id: 'none', label: 'Tidak Ada Korelasi' },
            { id: 'nonlinear', label: 'Kurvilinear (Non-linear)' }
        ];

        // Fungsi Kontrol Musik
        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicIcon.innerText = "🔇";
            } else {
                bgMusic.play().then(() => {
                    musicIcon.innerText = "🔊";
                }).catch(error => {
                    console.log("Autoplay dicegah oleh browser. Memerlukan interaksi pengguna.");
                });
            }
            isMusicPlaying = !isMusicPlaying;
        }

        toggleMusicBtn.addEventListener('click', toggleMusic);

        // Fungsi API Gemini dengan Exponential Backoff
        async function callGemini(prompt, systemPrompt = "Kamu adalah guru matematika SMA yang asyik.") {
            aiResponseContainer.classList.remove('hidden');
            aiLoader.classList.remove('hidden');
            aiText.innerText = "Berpikir...";

            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('Gagal menghubungi API');
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    aiLoader.classList.add('hidden');
                    aiText.innerText = text || "Tidak ada respon.";
                    return;
                } catch (err) {
                    const wait = Math.pow(2, i) * 1000;
                    await new Promise(resolve => setTimeout(resolve, wait));
                }
            }
            aiLoader.classList.add('hidden');
            aiText.innerText = "Maaf, Tutor AI sedang istirahat. Coba lagi nanti!";
        }

        function drawAxes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(40, 20);
            ctx.lineTo(40, 360);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(40, 360);
            ctx.lineTo(380, 360);
            ctx.stroke();

            ctx.fillStyle = '#64748b';
            ctx.font = '12px Poppins';
            ctx.fillText('Y (Variabel Dependen)', 45, 30);
            ctx.fillText('X (Variabel Independen)', 280, 380);
        }

        function generateData(type) {
            const points = [];
            const numPoints = 45;
            const margin = 60;
            const w = canvas.width - margin * 2;
            const h = canvas.height - margin * 2;

            for (let i = 0; i < numPoints; i++) {
                let x = Math.random() * w + margin;
                let y;
                let noise = (Math.random() - 0.5);

                switch(type) {
                    case 'pos_strong': y = canvas.height - x + (noise * 30); break;
                    case 'pos_weak': y = canvas.height - x + (noise * 130); break;
                    case 'neg_strong': y = x + (noise * 30); break;
                    case 'neg_weak': y = x + (noise * 130); break;
                    case 'none': y = Math.random() * h + margin; break;
                    case 'nonlinear': 
                        let nx = (x - margin) / w;
                        y = 300 - (Math.pow(nx - 0.5, 2) * 800) + (noise * 50);
                        break;
                }
                y = Math.max(margin, Math.min(canvas.height - margin, y));
                points.push({x: Math.round(x), y: Math.round(y)});
            }
            return points;
        }

        function drawPoints(points) {
            ctx.fillStyle = '#4f46e5';
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function generateQuestion() {
            drawAxes();
            aiResponseContainer.classList.add('hidden');
            const randomType = types[Math.floor(Math.random() * types.length)];
            currentAnswer = randomType.id;
            
            const points = generateData(currentAnswer);
            drawPoints(points);

            optionsContainer.innerHTML = '';
            const shuffled = [...types].sort(() => 0.5 - Math.random());
            
            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-choice bg-indigo-50 border-2 border-indigo-200 text-indigo-800 py-3 px-4 rounded-xl font-medium hover:bg-indigo-600 hover:text-white hover:border-indigo-600 transition shadow-sm";
                btn.innerText = opt.label;
                btn.onclick = () => checkAnswer(opt.id, btn);
                optionsContainer.appendChild(btn);
            });

            feedback.className = "hidden text-center p-4 rounded-lg font-bold mb-4";
            nextBtn.classList.add('hidden');
        }

        function checkAnswer(id, btn) {
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            if (id === currentAnswer) {
                score += 10;
                scoreElement.innerText = score;
                btn.classList.replace('bg-indigo-50', 'bg-green-500');
                btn.classList.replace('text-indigo-800', 'text-white');
                btn.classList.replace('border-indigo-200', 'border-green-600');
                showFeedback(true, "Luar biasa! Jawabanmu benar.");
            } else {
                btn.classList.replace('bg-indigo-50', 'bg-red-500');
                btn.classList.replace('text-indigo-800', 'text-white');
                btn.classList.replace('border-indigo-200', 'border-red-600');
                
                buttons.forEach(b => {
                    const found = types.find(t => t.label === b.innerText);
                    if (found && found.id === currentAnswer) {
                        b.classList.replace('bg-indigo-50', 'bg-green-200');
                        b.classList.add('border-green-500');
                    }
                });
                showFeedback(false, `Kurang tepat. Pola ini sebenarnya adalah ${types.find(t => t.id === currentAnswer).label}.`);
            }

            if (currentLevel < 10) {
                nextBtn.classList.remove('hidden');
            } else {
                showFinalResult();
            }
        }

        function showFeedback(isCorrect, msg) {
            feedback.innerText = msg;
            feedback.classList.remove('hidden');
            feedback.classList.add(isCorrect ? 'bg-green-100' : 'bg-red-100');
            feedback.classList.add(isCorrect ? 'text-green-700' : 'text-red-700');
        }

        function showFinalResult() {
            document.getElementById('result-modal').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `Permainan selesai! Skor akhirmu: ${score}`;
        }

        nextBtn.onclick = () => {
            currentLevel++;
            levelElement.innerText = currentLevel;
            generateQuestion();
        };

        // Integrasi AI
        document.getElementById('ai-explain-btn').onclick = () => {
            const label = types.find(t => t.id === currentAnswer).label;
            const prompt = `Berikan penjelasan singkat kenapa diagram pencar ini disebut "${label}". Jelaskan hubungan antara variabel X dan Y secara sederhana untuk murid kelas 11 SMA.`;
            callGemini(prompt);
        };

        document.getElementById('ai-scenario-btn').onclick = () => {
            const label = types.find(t => t.id === currentAnswer).label;
            const prompt = `Buatlah satu skenario cerita pendek di dunia nyata yang memiliki hubungan "${label}". Contoh: hubungan antara suhu udara dan penjualan es krim. Buat yang kreatif dan dekat dengan kehidupan remaja di Indonesia.`;
            callGemini(prompt, "Kamu adalah guru matematika yang sangat kreatif dalam bercerita.");
        };

        window.onload = generateQuestion;
    </script>
</body>
</html>
